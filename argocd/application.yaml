apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: migration-test
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/your-org/migration-test  # replace with your repo
    targetRevision: HEAD
    path: argocd

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
